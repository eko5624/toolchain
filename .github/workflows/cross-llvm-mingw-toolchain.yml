name: linux-profile
defaults:
  run:
    shell: bash
on:
  workflow_dispatch:
  
jobs:
  linux-profile:
    runs-on: ubuntu-latest
    container:
      image: docker://ghcr.io/eko5624/archlinux:latest
    steps:
      - name: Checkout
        uses: actions/checkout@main      
      - name: Loading profile-profdata cache
        uses: actions/cache/restore@main
        id: profile-profdata
        with:
          path: ${{ github.workspace }}/profile.profdata
          key: profile-profdata-${{ github.run_id }}
          restore-keys: |
            profile-profdata-
      - name: Load llvm-project source
        uses: actions/cache@main
        id: llvm-source
        with:
          path: ${{ github.workspace }}/source/llvm-project
          key: llvm-source-cache            
      - name: Install stage1 Clang
        if: ${{ steps.linux-profile-llvm.outputs.cache-matched-key == '' }}
        run: |
          curl -OL https://github.com/mstorsjo/llvm-mingw/releases/download/20250709/llvm-mingw-stage1-20250709-ucrt-ubuntu-22.04-x86_64.tar.xz
          tar -xvf llvm-mingw-stage1*.tar.xz 2>/dev/null >/dev/null
          rm llvm-mingw-stage1*.tar.xz
          mv llvm-mingw-stage1* llvm-mingw-stage1
      - name: Building linux-profile-llvm
        run: |
          ./llvm-mingw/llvm.sh --profile $(pwd)/llvm-mingw-stage1
      - name: Train pgo
        run: |
          cd llvm-mingw
          ./pgo-training.sh --x86_64 ../source/llvm-project/llvm/build-instrumented ../llvm-mingw-stage1
          cd ..
          mv llvm-mingw/profile.profdata ./
      - name: Save profile.profdata cache
        if: ${{ steps.llvm-profdata.outputs.cache-matched-key == '' }}
        uses: actions/cache/save@main
        with:
          path: ${{ github.workspace }}/profile.profdata
          key: profile-profdata-${{ github.run_id }}

  linux-toolchain:
    needs: [linux-profile]
    runs-on: ubuntu-latest
    container:
      image: docker://ghcr.io/eko5624/archlinux:latest
    steps:
      - name: Checkout
        uses: actions/checkout@main      
      - name: Loading profile-profdata cache
        uses: actions/cache/restore@main
        id: profile-profdata
        with:
          path: ${{ github.workspace }}/profile.profdata
          key: profile-profdata-${{ github.run_id }}
          restore-keys: |
            profile-profdata-
      - name: Load llvm-project source
        uses: actions/cache@main
        id: llvm-source
        with:
          path: ${{ github.workspace }}/source/llvm-project
          key: llvm-source-cache            
      - name: Install stage1 Clang
        if: ${{ steps.linux-profile-llvm.outputs.cache-matched-key == '' }}
        run: |
          curl -OL https://github.com/${{ github.repository }}/releases/download/toolchain/llvm-mingw-stage1-latest-ucrt-x86_64.tar.xz
          tar -xvf llvm-mingw-stage1-latest-ucrt-x86_64.tar.xz 2>/dev/null >/dev/null
          rm llvm-mingw-stage1-latest-ucrt-x86_64.tar.xz
          mv llvm-mingw-stage1 /opt/llvm-mingw
      - name: Building linux-llvm
        run: |
          ./llvm-mingw/llvm.sh /opt/llvm-mingw $(pwd)/install/llvm-mingw --thinlto --pgo
      - name: Get current timestamp
        run: echo "date=$(date +%Y%m%d)" >> $GITHUB_ENV
      - name: Packaging toolchain
        run: |
          cd install
          tar -zcvf ../llvm-mingw-latest-ucrt-linux-x86_64.tar.xz llvm-mingw 2>/dev/null >/dev/null
          cp ../llvm-mingw-latest-ucrt-linux-x86_64.tar.xz ../llvm-mingw-$date-ucrt-linux-x86_64.tar.xz
      - name: Delete
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          chmod +x ./package-delete.sh
          ./package-delete.sh llvm-mingw-latest-ucrt-linux-x86_64.tar.xz
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: toolchain
          name: toolchain
          files: llvm-mingw*.tar.xz
